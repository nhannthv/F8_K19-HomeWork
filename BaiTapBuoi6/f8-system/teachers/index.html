<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Teachers</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">

    <style>
        h2.title#special {
            color: green;
        }

        .section {
            color: gray;

            /* selectors có độ chi tiết tương đồng nhưng viết sau nên ghi đè base.css */
        }
    </style>
</head>

<body>
    <h1>TEACHERS PAGE</h1>
    <h2 class="title" id="special">Danh sach giang vien</h2>

    <!-- 
        Phần tử này có tag name (h2), class (.title), id (#special), và internal css
        internal css thắng vì chi tiết hơn, bao gồm cả tagname, class và id (h2.titlel#special)
        Màu hiển thị: green
    -->
    <h3 class="section">Giang vien HTML</h3>
    <h3 class="section">Giang vien CSS</h3>
    <h3 class="section">Giang vien Javascript</h3>
    <h3 class="section">Giang vien React</h3>
</body>

</html>
