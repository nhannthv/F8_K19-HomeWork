<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Orders</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
</head>

<body>
    <h1 style="color: green;">ORDERS PAGE</h1>
    <h2 class="title" id="special" style="color: red;">Danh sach don hang</h2>

    <!-- 
        Phần tử này có class(.title), id(#special), inline style
        inline style thắng vì can thiệp trực tiếp trên thẻ
        màu hiển thị: đỏ
    -->
        
    <p style="color: gray;">Don hang 001</p>
    <p>Don hang 002</p>
    <p class="highlight">Don hang 003</p>
    <p class="highlight">Don hang 004</p>

    <!-- Inline style thắng cả class và id -->
</body>

</html>
