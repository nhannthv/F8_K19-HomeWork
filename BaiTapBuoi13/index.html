<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Expanding Strips Hover Effect</title>

    <!-- Font Monserrat -->
    <!-- K tìm thấy font Helvetica -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- Style Css -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- Strip Layout -->
    <div class="strip-list">

        <!-- Strip 1 -->
        <div class="strip-item">
            <div class="content">
                <h2>Relax</h2>
            </div>
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=600&fit=crop" alt=""
                class="image">
            <div class="overlay"></div>
        </div>

        <!-- Strip 2 -->
        <div class="strip-item">
            <div class="content">
                <h2>Explore</h2>
            </div>
            <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&h=600&fit=crop" alt=""
                class="image">
            <div class="overlay"></div>
        </div>

        <!-- Strip 3 -->
        <div class="strip-item">
            <div class="content">
                <h2>Travel</h2>
            </div>
            <img src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=800&h=600&fit=crop" alt=""
                class="image">
            <div class="overlay"></div>
        </div>

        <!-- Strip 4 -->
        <div class="strip-item">
            <div class="content">
                <h2>Achieve</h2>
            </div>
            <img src="https://images.unsplash.com/photo-1484589065579-248aad0d8b13?w=800&h=600&fit=crop" alt=""
                class="image">
            <div class="overlay"></div>
        </div>

        <!-- Strip 5 -->
        <div class="strip-item">
            <div class="content">
                <h2>Dare</h2>
            </div>
            <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop" alt=""
                class="image">
            <div class="overlay"></div>
        </div>
    </div>
</body>

</html>
